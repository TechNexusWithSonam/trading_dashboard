services:
  - type: web
    name: raima-markets
    runtime: python
    region: singapore
    plan: starter
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /ping
    envVars:
      - key: UPSTOX_API_KEY
        sync: false
      - key: UPSTOX_API_SECRET
        sync: false
      - key: UPSTOX_ACCESS_TOKEN
        sync: false
      - key: UPSTOX_REDIRECT_URI
        value: https://api.raimatheuniqueconcepts.com/auth/callback
      - key: MOCK_MODE
        value: "false"
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
